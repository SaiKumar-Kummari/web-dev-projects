<html>
    <head>
       <style>
            body
            {
                display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
                background:#222;
                color:white;
                font-family:Arial;
                height:100vh;
                margin:0;
            }
            #display
            {  
                font-size:20px;
                margin-bottom:20px;
                letter-spacing:2px;
            }
            button{
                padding:10px 20px;
                margin:5px;
                font-size:16px;
                border:none;
                border-radius:5px;
                cursor:pointer;
            }
            #start
            {
                background:green;
                color:white;
            }
            #pause
            {
                background:orange;
                color:white;
            }
            #reset{
                background:red;
                color:white;
            }
            .container{
            
                gap:50px;
            }
       </style>
    </head>
    <body>
        <center>
        <div class="container">
        <button class="box" id="start" onclick="start()">start</button>
        <button id="stop" onclick="stop()">stop</button>
        <button id="pause" onclick="pause()">pause</button>
        <div id="display">00:00:00</div>
        </div>
        </center>
        <script>
            var t;
            var seconds=0;
            var minutes=0;
            var hours=0;
            let isRunning=false;
            function start()
            {
                if(!isRunning)
            {
            t=setInterval(function()
            {
                seconds++; 
                if(seconds==60)
                {
                    //console.log("60 seconds");
                    seconds=0;   
                    minutes++;
                }
                if(minutes==60)
                {
                    //seconds=0;
                    minutes=0;
                    hours=1;
                }
            updateDisplay();
            },1000);
            isRunning=true;
        }
            }
            function stop()
            {
                clearInterval(t);
                seconds=0;
                minutes=0;
                hours=0;
                isRunning=false;
                updateDisplay();
            }
            function pause()
            {

                clearInterval(t);
                isRunning=false;
                updateDisplay();
            }
            function updateDisplay()
            {
                let display=document.getElementById("display");
                let sec=seconds<10?"0"+seconds:seconds;
                let min=minutes<10?"0"+minutes:minutes;
                let h=hours<10?"0"+hours:hours;
                display.innerText=h+":"+min+":"+sec;
            }
        </script>
    </body>
</html>
