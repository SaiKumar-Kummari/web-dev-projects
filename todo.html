<html>
    <head>
        <title>
            Todo App
        </title>
        <style>
            body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
h1 
{
    text-align: center;
    color: #333;
}
input {
    flex: 1;
    padding: 10px;
    border: 2px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #0056b3;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #f1f1f1;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 6px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}
        </style>
    </head>
    <body>
        <center>
        <h2>ToDO App</h2>
        <input type="text" name="text" placeholder="enter task" id="text"><br><br><br>
        <button onclick="openData()">Add Work</button><br>    
        <ul id="list"></ul>
        </center>
    </body>
    <script>
        function openData()
        {
            let input=document.getElementById("text").value;
            //let ul=document.getElementByTagName("ul");
            if(input=="")
            {
                alert("enter the task");
                return;
            }  
            let li=document.createElement("li");
            li.innerText=input;
            document.getElementById("list").appendChild(li); 
        }
    </script>
</html>
